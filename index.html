<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spoti'stat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body x-data="spotifyApp()">

<!-- La navbar -->
<nav class="navbar navbar-custom py-4 text-white">
  <div class="container-fluid d-flex flex-column align-items-center text-center">
    <h1 class="fw-bold mb-1">Mes musiques LUNESQUES</h1>
    <small>Un peu de musiques de jeux vidéos (BEAUCOUP) et animés, anyways, écoutez ou ça va mal se passer.</small>
  </div>
</nav>

<!-- Les graphiques -->
<main class="container my-4">

<!--Top artistes-->
  <div class="row g-4 mb-4">
    <section class="col-lg-6">
      <div class="card">
        <div class="card-header header-red fw-bold text-white">Top 10 des artistes</div>
        <div class="card-body chart-body"><canvas id="artistsChart"></canvas></div>
      </div>
    </section>

<!-- Distribution des genres -->
    <section class="col-lg-6">
      <div class="card">
        <div class="card-header header-red fw-bold text-white">Distribution des genres</div>
        <div class="card-body chart-body"><canvas id="genresChart"></canvas></div>
      </div>
    </section>
</div>

<!-- La liste des morceaux -->
<section class="mb-5">
  <div class="card">
    <div class="card-header header-purple d-flex justify-content-between align-items-center py-2">
      <span class="fw-bold text-white">Liste de mes morceaux</span>
      <input type="search" class="form-control form-control-sm bg-white w-auto" placeholder="Rechercher..." x-model="searchQuery">
    </div>

<!-- Les albumspopulaires -->
  <section class="mb-5">
    <h2 class="fs-4 fw-bold mb-4">Albums Populaires</h2>
    <div class="row row-cols-2 row-cols-lg-6 g-3">
      <template x-for="album in topAlbums" :key="album.id">
        <div class="col">
          <div class="card h-100 p-2">
            <img :src="bestImage(album.images)" :alt="album.name" class="img-fluid rounded mb-2 album-cover">
            <h3 class="fs-6 fw-bold text-truncate mb-0" x-text="album.name"></h3>
            <p class="text-muted small text-truncate mb-1" x-text="album.artists[0]?.name"></p>
            <p class="text-muted mb-2 small" x-text="formatDate(album.release_date)"></p>
            <div class="d-flex justify-content-between">
              <span class="badge bg-primary" x-text="album.total_tracks+' titres'"></span>
              <span class="badge bg-success" x-text="'Pop. '+album.popularity"></span>
          </div>
        </div>
    </div>
      </template>
    </div>
  </section>



      
<!-- Petit footer tout mimi -->

<footer class="footer-custom text-center py-4 text-white small">
  <p class="mb-0">© 2026 J-Music Explorer — Projet Luna EGIDO-NEFFLIEZ MMI</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script/script.js"></script>
</body>
</html>
